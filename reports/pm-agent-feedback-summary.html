<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Protected Page</title>
<style>
*,:before,:after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.lock-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#F7F7F7}
.lock-card{background:#fff;border-radius:16px;box-shadow:0 2px 4px rgba(25,25,25,0.1);border:1px solid rgba(0,0,0,0.1);padding:36px;width:100%;max-width:380px;text-align:center}
.lock-logo{margin-bottom:24px}
.lock-logo svg{width:92px;height:20px}
.lock-card h2{font-size:18px;font-weight:500;color:#191919;margin-bottom:8px;letter-spacing:-0.01em}
.lock-card p{font-size:14px;line-height:20px;color:#737373;margin-bottom:24px}
.lock-input{width:100%;height:44px;padding:0 14px;border:1px solid rgba(0,0,0,0.15);border-radius:8px;font:400 14px/20px 'Inter',sans-serif;color:#191919;background:#fff;outline:none;transition:border-color 200ms cubic-bezier(0.2,0,0,1)}
.lock-input:focus{border-color:#E4002B}
.lock-input.shake{animation:shake .4s ease-out;border-color:#E5353D}
.lock-btn{width:100%;height:44px;margin-top:12px;background:#E4002B;color:#fff;border:none;border-radius:8px;font:500 14px/20px 'Inter',sans-serif;cursor:pointer;transition:background 200ms cubic-bezier(0.2,0,0,1)}
.lock-btn:hover{background:#C71A21}
.lock-error{font-size:12px;line-height:16px;color:#E5353D;margin-top:8px;min-height:16px}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
</style>
</head>

  var IV_HEX='8bb898be00b312a1f6e0f934e18ad354';
  var MAX_ATTEMPTS=5;
  var attempts=0;
  function hexToBytes(h){for(var b=new Uint8Array(h.length/2),i=0;i<h.length;i+=2){b[i/2]=parseInt(h.substring(i,i+2),16);}return b;}
  function deriveKey(pwd,salt){return crypto.subtle.importKey('raw',new TextEncoder().encode(pwd),{name:'PBKDF2'},false,['deriveKey']).then(function(k){return crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:100000,hash:'SHA-256'},k,{name:'AES-CBC',length:256},false,['decrypt'])});}
  function decryptData(key,iv,cipher){return crypto.subtle.decrypt({name:'AES-CBC',iv:iv},key,cipher);}
  function go(){
    var pwd=document.getElementById('pwd').value;
    if(!pwd){return;}
    var raw=atob(CIPHER);
    var bytes=new Uint8Array(raw.length);
    for(var i=0;i<raw.length;i++){bytes[i]=raw.charCodeAt(i);}
    var salt=bytes.slice(0,16);
    var cipherBytes=bytes.slice(16);
    deriveKey(pwd,salt).then(function(key){
      return decryptData(key,hexToBytes(IV_HEX),cipherBytes);
    }).then(function(plain){
      var html=new TextDecoder().decode(plain);
      document.open();document.write(html);document.close();
    }).catch(function(){
      attempts++;
      var left=MAX_ATTEMPTS-attempts;
      var el=document.getElementById('error');
      var inp=document.getElementById('pwd');
      if(left<=0){
        el.textContent='Too many attempts. Please reload the page.';
        document.getElementById('submit').disabled=true;
        return;
      }
      el.textContent='Incorrect password. '+left+' attempt'+(left>1?'s':'')+' remaining.';
      inp.classList.add('shake');
      setTimeout(function(){inp.classList.remove('shake');},400);
      inp.value='';inp.focus();
    });

  document.getElementById('pwd').addEventListener('keydown',function(e){if(e.key==='Enter'){go();}});
