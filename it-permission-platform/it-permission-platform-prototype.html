<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IT 权限管理平台 · 原型</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --qima-red:#E4002B;--qima-red-dark:#C71A21;--qima-red-900:#9E141B;--qima-red-bg:#FDEFEF;--brand-labs:#1F2547;
  --pool:#4169E1;--pool-dark:#1E46BD;--pool-900:#1E46BD;--pool-bg:#EEF2FF;--pool-100:rgba(65,105,225,.4);
  --white:#fff;--mist:#F7F7F7;--seal:#F0F0F0;--cloud:#DEDEDE;--pearl:#BFBFBF;
  --ash:#979797;--stone:#737373;--slate:#3E3E3E;--carbon:#191919;
  --cherry-050:#FDEFEF;--cherry-500:#E5353D;--cherry-900:#9E141B;
  --orange-050:#FCF2E6;--orange-500:#F58F00;--orange-900:#B26309;
  --lemon-050:#FFF9E7;--lemon-900:#BD8A00;
  --kiwi-050:#EAF6F2;--kiwi-500:#00A876;--kiwi-900:#006648;
  --border:rgba(0,0,0,.1);--shadow-0:0 1px 2px rgba(25,25,25,.08);--shadow-1:0 2px 10px rgba(25,25,25,.05);--shadow-2:0 4px 12px rgba(25,25,25,.15);
  --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--font-cjk:'Noto Sans SC','Inter',sans-serif;--font-mono:'DM Mono',ui-monospace,Menlo,monospace;
  --ease:cubic-bezier(.2,0,0,1);--dur:200ms;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
*:not(textarea)::-webkit-scrollbar{width:6px;height:6px}
*:not(textarea)::-webkit-scrollbar-thumb{border-radius:16px;background:var(--cloud)}
*:not(textarea)::-webkit-scrollbar-thumb:hover{background:#b3b3b3}
body{min-height:100vh;font:400 14px/1.5 var(--font-cjk);color:var(--carbon);background:var(--mist);-webkit-font-smoothing:antialiased}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
a{color:var(--pool);text-decoration:none}
a:hover{text-decoration:underline}

/* topbar */
.topbar{position:sticky;z-index:999;top:0;width:100vw;height:72px;display:flex;align-items:center;gap:24px;padding:0 24px;background:var(--white);border-bottom:1px solid var(--border);box-shadow:var(--shadow-0)}
.brand{display:flex;align-items:center;gap:12px;min-width:292px}
.brand .logo{width:32px;height:32px;border-radius:8px;background:var(--qima-red);display:grid;place-items:center;color:#fff;font-size:14px;font-weight:700;font-family:var(--font-sans)}
.brand-title{padding-left:12px;border-left:1px solid var(--border)}
.brand .title{font:600 15px/20px var(--font-sans);letter-spacing:-.01em;color:var(--carbon)}
.brand .sub{font:400 12px/16px var(--font-sans);color:var(--stone)}
.top-actions{margin-left:auto;display:flex;align-items:center;gap:12px}
.env-pill{font:600 12px/16px var(--font-sans);color:var(--stone);background:var(--mist);border:1px solid var(--border);padding:0 12px;border-radius:999px;height:32px;display:inline-flex;align-items:center}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--orange-050);color:var(--orange-900);font-weight:700;display:grid;place-items:center;font:700 12px/16px var(--font-sans)}

/* layout */
.layout{display:grid;grid-template-columns:240px minmax(0,1fr);min-height:calc(100vh - 72px)}
.sidebar{position:sticky;top:72px;left:0;z-index:30;width:240px;height:calc(100vh - 72px);background:var(--mist);border-right:1px solid var(--border);overflow-y:auto;padding:16px 12px}
.side-title{font:600 11px/12px var(--font-sans);color:var(--ash);letter-spacing:.08em;padding:8px 12px 8px;text-transform:uppercase}
.nav{display:grid;gap:4px}
.nav button{display:flex;align-items:center;gap:12px;width:100%;min-height:44px;padding:10px 12px;border:0;border-radius:8px;background:transparent;color:var(--stone);text-align:left;font:500 13.5px/18px var(--font-cjk);transition:background var(--dur) var(--ease),color var(--dur) var(--ease)}
.nav button svg{width:18px;height:18px;flex-shrink:0;color:var(--stone)}
.nav button:hover{background:var(--white);color:var(--slate)}
.nav button.active{background:var(--pool-bg);color:var(--pool-dark);font-weight:600}
.nav button.active svg{color:var(--pool)}
.nav .badge{margin-left:auto;font:600 11px/16px var(--font-sans);color:var(--stone);background:var(--seal);border-radius:999px;padding:0 8px;height:20px;display:inline-flex;align-items:center}
.nav button.active .badge{background:var(--white);color:var(--pool-dark)}
.side-foot{margin-top:36px;padding:12px;border:1px solid var(--border);border-radius:16px;background:var(--white);color:var(--stone);font:400 12px/16px var(--font-cjk)}
.side-foot strong{display:block;margin-bottom:4px;color:var(--carbon);font-size:13px}

.main{min-width:0;padding:36px;max-width:1320px;width:100%}

/* breadcrumb + page head */
.crumb{font:400 12px/16px var(--font-sans);color:var(--stone);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.crumb a{color:var(--pool);cursor:pointer}
.crumb a:hover{text-decoration:underline}
.crumb .sep{color:var(--pearl)}
.page-head{display:flex;align-items:flex-start;gap:24px;margin-bottom:20px;flex-wrap:wrap}
.eyebrow{margin-bottom:6px;color:var(--stone);font:600 11px/12px var(--font-sans);letter-spacing:.08em;text-transform:uppercase}
.page-head h1{font:400 32px/40px var(--font-cjk);letter-spacing:-.02em;color:var(--carbon)}
.page-head .desc{max-width:760px;margin-top:6px;font:400 15px/24px var(--font-cjk);color:var(--stone)}
.page-head .spacer{margin-left:auto;display:flex;gap:8px;align-items:flex-start}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:40px;padding:0 16px;border:1px solid var(--border);border-radius:8px;background:var(--white);color:var(--carbon);font:600 14px/20px var(--font-sans);transition:transform var(--dur) var(--ease),background var(--dur) var(--ease),border var(--dur) var(--ease)}
.btn:hover{transform:translateY(-1px);border-color:var(--cloud);background:var(--mist)}
.btn svg{width:15px;height:15px}
.btn-primary{background:var(--pool);border-color:var(--pool);color:#fff}
.btn-primary:hover{background:var(--pool-dark);border-color:var(--pool-dark)}
.btn-secondary{background:#E6ECFB;border-color:transparent;color:var(--pool-dark)}
.btn-secondary:hover{background:#d8e1fa}
.btn-danger{border-color:var(--cherry-500);color:var(--cherry-900);background:var(--cherry-050)}
.btn-danger:hover{background:var(--cherry-050)}
.btn-ghost{border-color:transparent;background:transparent;color:var(--pool-dark)}
.btn-ghost:hover{background:var(--pool-bg)}
.btn-sm{min-height:32px;padding:0 12px;font:600 13px/18px var(--font-sans)}

/* list toolbar */
.list-toolbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.search{position:relative;flex:1;min-width:260px;max-width:520px;height:40px;display:flex;align-items:center;gap:8px;padding:0 16px;border:1px solid var(--border);border-radius:8px;background:var(--mist)}
.search svg{width:16px;height:16px;color:var(--ash)}
.search input{width:100%;border:0;outline:0;background:transparent;font:400 13px/20px var(--font-cjk);color:var(--carbon)}
.search input::placeholder{color:var(--ash)}
.search:focus-within{border-color:var(--pool);background:var(--white);box-shadow:0 0 0 3px var(--pool-bg)}
.filter{display:flex;align-items:center;gap:6px;height:40px;padding:0 8px 0 12px;border:1px solid var(--border);border-radius:8px;background:var(--white);color:var(--stone);font:400 13px/20px var(--font-cjk)}
.filter select{border:0;background:transparent;font:400 13px/20px var(--font-cjk);color:var(--carbon);cursor:pointer}
.filter select:focus{outline:none}

/* table */
.table-wrap{background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:var(--shadow-1)}
table{width:100%;border-collapse:collapse;font:400 13px/20px var(--font-cjk);color:var(--carbon)}
thead th{height:44px;background:var(--mist);font:600 13px/16px var(--font-sans);color:var(--carbon);text-align:left;padding:12px 16px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody td{padding:14px 16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--slate);vertical-align:middle}
tbody tr{cursor:pointer;transition:background var(--dur) var(--ease)}
tbody tr:hover{background:var(--qima-red-bg)}
tbody tr:last-child td{border-bottom:0}
.mono{font-family:var(--font-mono);font-size:12px}
.muted{color:var(--stone)}
.row-id{font-weight:600;color:var(--pool-900);font-family:var(--font-mono);font-size:12px}
.link-cell{color:var(--pool);font-weight:500}

/* badges / tags (pill, tint+text pairs) */
.tag{display:inline-flex;align-items:center;gap:6px;height:24px;padding:0 10px;border-radius:999px;font:600 12px/16px var(--font-sans);white-space:nowrap}
.tag-pool{background:var(--pool-bg);color:var(--pool-dark)}
.tag-kiwi{background:var(--kiwi-050);color:var(--kiwi-900)}
.tag-orange{background:var(--orange-050);color:var(--orange-900)}
.tag-red{background:var(--cherry-050);color:var(--cherry-900)}
.tag-grey{background:var(--seal);color:var(--slate)}
.tag .dot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* detail */
.back{display:inline-flex;align-items:center;gap:6px;font:500 13px/18px var(--font-sans);color:var(--stone);margin-bottom:12px;cursor:pointer}
.back:hover{color:var(--pool)}
.detail-head{display:flex;align-items:center;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.detail-head .meta{flex:1;min-width:240px}
.detail-head h2{font:500 18px/24px var(--font-cjk);color:var(--carbon);display:flex;align-items:center;gap:10px;letter-spacing:-.01em}
.detail-head .sub{font:400 13px/20px var(--font-cjk);color:var(--stone);margin-top:4px}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap}

/* cards / sections */
.section{background:var(--white);border:1px solid var(--border);border-radius:16px;margin-bottom:16px;box-shadow:var(--shadow-1);overflow:hidden}
.section-head{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--border)}
.section-head h3{font:600 16px/20px var(--font-cjk);letter-spacing:-.01em;color:var(--carbon)}
.section-head .hint{font:400 12px/16px var(--font-cjk);color:var(--stone)}
.section-head .spacer{margin-left:auto;display:flex;gap:6px;align-items:center}
.section-body{padding:20px}
.kv{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px 28px}
.kv-item{display:flex;flex-direction:column;gap:4px}
.kv-item .k{font:600 11px/12px var(--font-sans);color:var(--ash);letter-spacing:.08em;text-transform:uppercase}
.kv-item .v{font:500 13.5px/20px var(--font-cjk);color:var(--carbon)}
.kv-item .v.mono{font-family:var(--font-mono);font-weight:400;font-size:13px}

/* resource sub-tabs */
.subtabs{display:flex;gap:32px;padding:0 20px;border-bottom:1px solid var(--border);background:var(--white);overflow-x:auto}
.subtab{padding:12px 0;font:600 13px/16px var(--font-sans);color:var(--stone);border:0;background:transparent;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
.subtab:hover{color:var(--slate)}
.subtab.active{color:var(--pool-dark);border-bottom-color:var(--pool)}
.subpane{display:none}
.subpane.active{display:block}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{display:inline-flex;align-items:center;gap:6px;font:500 12px/16px var(--font-cjk);padding:4px 10px;border:1px solid var(--border);border-radius:999px;background:var(--white);color:var(--slate)}
.chip .x{color:var(--ash);cursor:pointer;font-size:14px;line-height:1}
.chip-add{border:1px dashed var(--cloud);color:var(--pool-dark);background:var(--pool-bg);cursor:pointer}
.chip-add:hover{background:#e2e8fb}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(25,25,25,.42);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding:60px 16px;overflow-y:auto}
.overlay.show{display:flex}
.modal{width:100%;max-width:560px;background:var(--white);border-radius:16px;box-shadow:var(--shadow-2);overflow:hidden}
.modal-lg{max-width:760px}
.modal-head{display:flex;align-items:center;gap:10px;padding:18px 22px;border-bottom:1px solid var(--border)}
.modal-head h3{font:600 16px/20px var(--font-cjk);color:var(--carbon)}
.modal-head .spacer{margin-left:auto}
.modal-body{padding:22px;max-height:64vh;overflow-y:auto}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:16px 22px;border-top:1px solid var(--border);background:var(--mist)}
.field{margin-bottom:16px}
.field label{display:block;font:600 12px/16px var(--font-sans);color:var(--stone);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;height:40px;padding:0 12px;border:1px solid var(--border);border-radius:8px;background:var(--white);font:400 13px/20px var(--font-cjk);color:var(--carbon)}
.field textarea{height:auto;padding:10px 12px;min-height:76px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--pool);box-shadow:0 0 0 3px var(--pool-bg)}
.field .hint{font:400 11px/16px var(--font-cjk);color:var(--ash);margin-top:5px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.seg{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.seg label{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;font:500 13px/16px var(--font-cjk);color:var(--stone);cursor:pointer;background:var(--white);border:0;border-right:1px solid var(--border)}
.seg label:last-child{border-right:0}
.seg input{display:none}
.seg input:checked+label{background:var(--pool-bg);color:var(--pool-dark);font-weight:600}

/* empty */
.empty{padding:48px 20px;text-align:center;color:var(--stone)}
.empty svg{width:42px;height:42px;color:var(--cloud);margin-bottom:10px}
.empty p{font-size:13px}

/* history timeline */
.timeline{position:relative;padding-left:22px}
.timeline::before{content:"";position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--seal)}
.tl-item{position:relative;padding:0 0 18px 6px}
.tl-item::before{content:"";position:absolute;left:-19px;top:5px;width:10px;height:10px;border-radius:50%;background:var(--white);border:2px solid var(--pool)}
.tl-item .tl-time{font:400 11px/16px var(--font-mono);color:var(--ash)}
.tl-item .tl-act{font:600 13px/18px var(--font-cjk);color:var(--carbon);margin:2px 0}
.tl-item .tl-meta{font:400 12px/16px var(--font-cjk);color:var(--stone)}

.close-x{width:32px;height:32px;border:0;border-radius:8px;background:transparent;color:var(--stone);display:grid;place-items:center;font-size:18px}
.close-x:hover{background:var(--mist);color:var(--carbon)}

/* resource tree mini */
.tree{font:400 13px/20px var(--font-cjk)}
.tree-node{padding:3px 0}
.tree-node .row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;cursor:pointer}
.tree-node .row:hover{background:var(--mist)}
.tree-node .caret{width:14px;color:var(--ash)}
.tree-children{padding-left:18px;border-left:1px dashed var(--cloud);margin-left:7px}

.stat-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.stat{flex:1;min-width:140px;background:var(--white);border:1px solid var(--border);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow-1)}
.stat .n{font:400 28px/32px var(--font-sans);letter-spacing:-.02em;color:var(--carbon)}
.stat .l{font:500 12px/16px var(--font-sans);color:var(--stone);margin-top:4px}
</style>
</head>

const $=s=>document.querySelector(s);
const main=$('#main');
let currentView='module';

const VIEWS={
 module:{title:'模块',desc:'权限目录的顶层模块。模块详情含关联资源、角色与数据隔离定义。'},
 role:{title:'角色 & 资源',desc:'跨模块角色检索。详情内绑定 Web / API / Data 三类资源。'},
 user:{title:'内部用户',desc:'只读来自 user-service 的用户列表。详情可编辑用户角色，角色可跳转角色页。'},
 customer:{title:'客户权限',desc:'客户 AccessKey 列表（含 client name）。详情含关联资源与访问日志。'},
 platform:{title:'平台权限',desc:'平台 AccessKey 列表。详情含 DIRECT 绑定资源与访问日志。'},
 history:{title:'历史记录',desc:'权限变更审计日志：谁创建/更新了模块、角色、用户角色与 AccessKey。'}
};

function render(){
 const cfg=VIEWS[currentView];
 main.innerHTML=renderList(currentView,cfg);
 bindList();
}

function btn(label,cls,svg,fn){
 return `<button class="btn ${cls||''}" ${fn?`onclick="${fn}"`:''}>${svg||''}${label}</button>`;
}
const SVG={
 plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>',

 trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>',
 back:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>',
 search:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>'
};

function renderList(view,cfg){
 const head=`
  <div class="page-head">
    <div class="meta"><div class="eyebrow">${view==='module'?'MODULES':view==='role'?'ROLES & RESOURCES':view==='user'?'INTERNAL USERS':view==='customer'?'CUSTOMER ACCESS KEYS':view==='platform'?'PLATFORM ACCESS KEYS':'HISTORY'}</div><h1>${cfg.title}</h1><div class="desc">${cfg.desc}</div></div>
    <div class="spacer">${listActions(view)}</div>
  </div>
  <div class="list-toolbar">
    <div class="search">${SVG.search}<input placeholder="搜索 ${cfg.title}…" oninput="filterList(this.value)"></div>
    ${listFilters(view)}
  </div>`;
 return head+`<div class="table-wrap">${listTable(view)}</div>`;
}

function listActions(view){
 if(view==='module')return btn('新建模块','btn-primary',SVG.plus,`openModal('moduleCreate')`);
 if(view==='role')return btn('新建角色','btn-primary',SVG.plus,`openModal('roleCreate')`);
 if(view==='customer')return btn('创建客户 AccessKey','btn-primary',SVG.plus,`openModal('akCreate','customer')`);
 if(view==='platform')return btn('创建平台 AccessKey','btn-primary',SVG.plus,`openModal('akCreate','platform')`);
 if(view==='user')return '';
 if(view==='history')return '';
 return '';
}

function listFilters(view){
 if(view==='role')return `<div class="filter">模块 <select><option>全部</option><option>Lab</option><option>Customer</option><option>Finance</option></select></div>`;
 if(view==='customer'||view==='platform')return `<div class="filter">状态 <select><option>全部</option><option>Active</option><option>Suspended</option></select></div><div class="filter">模式 <select><option>全部</option><option>inherit</option><option>direct</option></select></div>`;
 if(view==='user')return `<div class="filter">部门 <select><option>全部</option><option>IT</option><option>Lab</option><option>Finance</option><option>Customer</option><option>Inspector</option></select></div>`;
 return '';
}

function listTable(view){
 const rows=DATA[view].map((r,i)=>listRow(view,r,i)).join('');
 return `<table><thead>${listHead(view)}</thead><tbody id="tbody">${rows}</tbody></table>`;
}

function listHead(view){
 const map={
  module:`<tr><th>模块 ID</th><th>名称</th><th>描述</th><th>角色</th><th>资源</th><th>数据隔离</th></tr>`,
  role:`<tr><th>角色 Key</th><th>模块前缀</th><th>描述</th><th>Web</th><th>API</th><th>数据隔离</th></tr>`,
  user:`<tr><th>用户 ID</th><th>姓名</th><th>邮箱</th><th>部门</th><th>角色数</th></tr>`,
  customer:`<tr><th>AccessKey ID</th><th>客户名称</th><th>登录账号</th><th>模式</th><th>状态</th><th>创建</th></tr>`,
  platform:`<tr><th>AccessKey ID</th><th>平台名称</th><th>登录账号</th><th>模式</th><th>状态</th><th>创建</th></tr>`,
  history:`<tr><th>时间</th><th>操作人</th><th>操作</th><th>对象</th></tr>`
 };
 return map[view];
}

function listRow(view,r,i){
 const onclk=`data-idx="${i}" onclick="goDetail('${view}',${i})"`;
 if(view==='module')return `<tr ${onclk}><td class="row-id mono">${r.id}</td><td>${r.name}</td><td class="muted">${r.desc}</td><td><span class="tag tag-pool">${r.roles}</span></td><td>${r.resources}</td><td>${isoTag(r.isolation)}</td></tr>`;
 if(view==='role')return `<tr ${onclk}><td class="row-id mono">${r.name}</td><td>${r.module}</td><td class="muted">${r.desc}</td><td>${r.web}</td><td>${r.api}</td><td>${r.data?'<span class="tag tag-orange"><span class="dot"></span>隔离</span>':'—'}</td></tr>`;
 if(view==='user')return `<tr ${onclk}><td class="row-id mono">${r.id}</td><td>${r.name}</td><td class="mono">${r.email}</td><td>${r.dept}</td><td>${r.roles.length?`<span class="tag tag-pool">${r.roles.length}</span>`:'<span class="tag tag-grey">0</span>'}</td></tr>`;
 if(view==='customer'||view==='platform')return `<tr ${onclk}><td class="row-id mono">${r.id}</td><td>${r.client}</td><td class="mono">${r.login}</td><td>${modeTag(r.mode)}</td><td>${statusTag(r.status)}</td><td class="muted">${r.created}</td></tr>`;
 if(view==='history')return `<tr><td class="mono">${r.time}</td><td class="mono">${r.actor}</td><td>${r.act}</td><td class="muted">${r.meta}</td></tr>`;
 return '';
}

function isoTag(v){return v==='None'?'<span class="tag tag-grey">无</span>':`<span class="tag tag-orange">${v}</span>`;}
function statusTag(s){return s==='Active'?'<span class="tag tag-kiwi">Active</span>':'<span class="tag tag-red">Suspended</span>';}
function modeTag(m){return m==='inherit'?'<span class="tag tag-pool">inherit</span>':'<span class="tag tag-orange">direct</span>';}

function filterList(q){
 q=(q||'').toLowerCase();
 const rows=DATA[currentView];
 const tbody=$('#tbody');
 tbody.innerHTML=rows.map((r,i)=>{
  const hay=JSON.stringify(r).toLowerCase();
  return hay.includes(q)?listRow(currentView,r,i):'';
 }).join('');
}

function goDetail(view,i){
 const r=DATA[view][i];
 if(!r)return;
 if(view==='history')return;
 main.innerHTML=renderDetail(view,r,i);
 bindDetail();
 window.scrollTo(0,0);
}

function backToList(){render();window.scrollTo(0,0);}

function bindList(){
 document.querySelectorAll('#nav button').forEach(b=>{
  b.onclick=()=>{currentView=b.dataset.view;document.querySelectorAll('#nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');render();};
 });
}

  </div></div>`;
}

function jumpToRole(id){const i=DATA.role.findIndex(x=>x.id===id);if(i>=0){currentView='role';document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.view==='role'));goDetail('role',i);}}
function jumpToUser(id){const i=DATA.user.findIndex(x=>x.id===id);if(i>=0){currentView='user';document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.view==='user'));goDetail('user',i);}}

/* ---------- modals ---------- */
const MODALS={
 moduleCreate:{title:'新建模块',body:()=>`<div class="grid-2"><div class="field"><label>模块 ID</label><input placeholder="如 lab"></div><div class="field"><label>名称</label><input placeholder="Lab"></div></div><div class="field"><label>描述</label><textarea placeholder="模块用途…"></textarea></div><div class="field"><label>数据隔离维度</label><select><option>None</option><option>BU</option><option>Legal Entity</option><option>Region</option></select><div class="hint">后续可在模块详情修改</div></div>`},
 moduleEdit:{title:'编辑模块信息',body:i=>{const r=DATA.module[i];return `<div class="grid-2"><div class="field"><label>模块 ID</label><input value="${r.id}" disabled></div><div class="field"><label>名称</label><input value="${r.name}"></div></div><div class="field"><label>描述</label><textarea>${r.desc}</textarea></div>`;}},
 isoConfig:{title:'配置数据隔离',body:i=>{const r=DATA.module[i];return `<div class="field"><label>隔离维度</label><select><option ${r.isolation==='None'?'selected':''}>None</option><option ${r.isolation==='BU'?'selected':''}>BU</option><option ${r.isolation==='Legal Entity'?'selected':''}>Legal Entity</option><option ${r.isolation==='Region'?'selected':''}>Region</option></select><div class="hint">主数据维度，决定模块内资源的行级隔离</div></div>`;}},
 roleCreate:{title:'新建角色',body:()=>`<div class="grid-2"><div class="field"><label>角色 Key</label><input placeholder="module:roleName"></div><div class="field"><label>所属模块</label><select>${DATA.module.map(m=>`<option>${m.name}</option>`).join('')}</select></div></div><div class="field"><label>描述</label><input placeholder="角色用途…"></div>`},
 roleEdit:{title:'编辑角色',body:i=>{const r=DATA.role[i];return `<div class="grid-2"><div class="field"><label>角色 Key</label><input value="${r.name}"></div><div class="field"><label>所属模块</label><input value="${r.module}" disabled></div></div><div class="field"><label>描述</label><input value="${r.desc}"></div>`;}},
 userRole:{title:'编辑用户角色',body:i=>{const r=DATA.user[i];return `<div class="field"><label>用户</label><input value="${r.name} · ${r.email}" disabled></div><div class="field"><label>已分配角色</label><div class="chips" id="userRoleChips">${r.roles.map(rl=>`<span class="chip">${rl}<span class="x" onclick="this.parentElement.remove()">×</span></span>`).join('')}</div></div><div class="field"><label>添加角色</label><select><option>选择角色…</option>${DATA.role.map(x=>`<option>${x.name}</option>`).join('')}</select></div>`;}},
 akCreate:{title:(t)=>t==='platform'?'创建平台 AccessKey':'创建客户 AccessKey',body:(t)=>`<div class="field"><label>${t==='platform'?'平台':'客户'}名称</label><input placeholder="搜索 ${t==='platform'?'平台':'公司'}…" ></div><div class="grid-2"><div class="field"><label>登录账号</label><input placeholder="login id"></div><div class="field"><label>模式</label><div class="seg"><input type="radio" name="m" id="m1" ${t==='platform'?'':'checked'}><label for="m1">inherit</label><input type="radio" name="m" id="m2" ${t==='platform'?'checked':''}><label for="m2">direct</label></div></div></div><div class="field"><label>备注</label><input placeholder="用途说明…"></div><div class="hint">${t==='platform'?'平台 AccessKey 由后台直接创建并 DIRECT 绑定资源。':'后台代创建：原流程需客户先登录后自生成，此入口供 IT 直接为客户创建 AccessKey（新接口）。'} 创建后生成 access key 与 secret，仅展示一次。</div>`},
 akEdit:{title:'编辑 AccessKey',body:i=>{const r=DATA.customer[i]||DATA.platform[i];return `<div class="field"><label>AccessKey ID</label><input value="${r.id}" disabled></div><div class="grid-2"><div class="field"><label>${r.client}</label><input value="${r.login}"></div><div class="field"><label>状态</label><select><option ${r.status==='Active'?'selected':''}>Active</option><option ${r.status==='Suspended'?'selected':''}>Suspended</option></select></div></div>`;}},
 akLog:{title:'AccessKey 访问日志',body:i=>`<div class="timeline"><div class="tl-item"><div class="tl-time">2026-07-23 13:55</div><div class="tl-act">POST /v1/order/create</div><div class="tl-meta">200 OK · 142ms</div></div><div class="tl-item"><div class="tl-time">2026-07-23 13:12</div><div class="tl-act">GET /v1/order/list</div><div class="tl-meta">200 OK · 88ms</div></div><div class="tl-item"><div class="tl-time">2026-07-23 09:40</div><div class="tl-act">GET /v1/report</div><div class="tl-meta">403 · 资源未授权</div></div></div>`},
 bindWeb:{title:'绑定 Web 资源',body:()=>`<div class="field"><label>搜索资源</label><input placeholder="lab.dashboard…"></div><div class="field"><label>已选</label><div class="chips"><span class="chip">lab.dashboard</span><span class="chip">lab.sample.list</span></div></div>`},
 bindApi:{title:'绑定 API 资源',body:()=>`<div class="field"><label>搜索接口</label><input placeholder="GET /v1/…"></div><div class="field"><label>已选</label><div class="chips"><span class="chip">GET /v1/lab/samples</span></div></div>`},
 bindData:{title:'配置数据隔离',body:()=>`<div class="field"><label>隔离维度</label><select><option>BU</option><option>Legal Entity</option><option>Region</option></select></div><div class="field"><label>隔离值</label><input placeholder="如 700万 BU"></div>`},
 akBind:{title:'绑定资源',body:()=>`<div class="field"><label>资源类型</label><div class="seg"><input type="radio" name="t" id="t1" checked><label for="t1">Web</label><input type="radio" name="t" id="t2"><label for="t2">API</label></div></div><div class="field"><label>搜索</label><input placeholder="资源 / 接口…"></div>`},
 resourceManage:{title:'管理模块资源',body:()=>`<div class="field"><label>资源类型</label><div class="seg"><input type="radio" name="rt" id="rt1" checked><label for="rt1">PAGE</label><input type="radio" name="rt" id="rt2"><label for="rt2">BUTTON</label><input type="radio" name="rt" id="rt3"><label for="rt3">API</label></div></div><div class="field"><label>资源树</label><div class="tree"><div class="tree-node"><div class="row"><span class="caret">▾</span>lab.dashboard</div><div class="tree-children"><div class="tree-node"><div class="row"><span class="caret">▸</span>lab.sample.list</div></div><div class="tree-node"><div class="row"><span class="caret">▸</span>lab.report.view</div></div></div></div></div></div>`},
 roleManage:{title:'管理模块内角色',body:()=>`<div class="field"><label>角色列表</label><div class="chips">${DATA.role.map(r=>`<span class="chip">${r.name}</span>`).join('')}</div></div><div class="field"><label>新建角色</label><input placeholder="module:roleName"></div>`}
};

function openModal(key,arg){
 const m=MODALS[key];if(!m)return;
 const title=typeof m.title==='function'?m.title(arg):m.title;
 const body=typeof m.body==='function'?m.body(arg):m.body;
 $('#overlay').innerHTML=`<div class="modal">
   <div class="modal-head"><h3>${title}</h3><div class="spacer"></div><button class="close-x" onclick="closeModal()">×</button></div>
   <div class="modal-body">${body}</div>
   <div class="modal-foot"><button class="btn" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="closeModal()">保存</button></div>
 </div>`;
 $('#overlay').classList.add('show');
}
function closeModal(){$('#overlay').classList.remove('show');$('#overlay').innerHTML='';}

/* subtabs inside detail */
document.addEventListener('click',e=>{
 const st=e.target.closest('.subtab');
 if(!st)return;
 const wrap=st.parentElement;
 wrap.querySelectorAll('.subtab').forEach(x=>x.classList.remove('active'));
 st.classList.add('active');
 const p=st.dataset.p;
 const body=wrap.parentElement.querySelector('.section-body');
 if(body){body.querySelectorAll('.subpane').forEach(x=>x.classList.toggle('active',x.dataset.p===p));}
});

render();
</script>
</body>
